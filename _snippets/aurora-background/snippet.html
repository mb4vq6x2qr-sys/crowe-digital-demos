<!-- ══════════════════════════════════════════════
   SNIPPET — AURORA BACKGROUND
   Quelle: aceternity.com/components/aurora-background

   Animierter Nordlicht-Effekt als Seitenhintergrund.
   Sanfte Farbwellen (Blau/Indigo/Violet) die sich
   langsam bewegen. Radial-Maske oben rechts optional.

   Anpassen:
   - Farben: --ab-c1 bis --ab-c5 (Standard: Blautöne)
   - Höhe: .ab-wrap min-height (Standard: 100vh)
   - data-radial="false" um Maske zu deaktivieren
   - Inhalt in .ab-content
══════════════════════════════════════════════ -->

<style>
@keyframes aurora {
  0%   { background-position: 50% 50%, 50% 50%; }
  100% { background-position: 350% 50%, 350% 50%; }
}

.ab-wrap {
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  background: #fafafa; /* bg-zinc-50 */
  color: #0f172a;
  overflow: hidden;
}

.ab-aurora {
  pointer-events: none;
  position: absolute;
  inset: -10px;
  opacity: 0.5;
  filter: blur(10px) invert(1);
  will-change: transform;

  --ab-c1: #3b82f6;   /* blue-500 */
  --ab-c2: #a5b4fc;   /* indigo-300 */
  --ab-c3: #93c5fd;   /* blue-300 */
  --ab-c4: #ddd6fe;   /* violet-200 */
  --ab-c5: #60a5fa;   /* blue-400 */

  background-image:
    repeating-linear-gradient(100deg, #fff 0%, #fff 7%, transparent 10%, transparent 12%, #fff 16%),
    repeating-linear-gradient(100deg,
      var(--ab-c1) 10%, var(--ab-c2) 15%,
      var(--ab-c3) 20%, var(--ab-c4) 25%,
      var(--ab-c5) 30%);
  background-size: 300% 100%, 200% 100%;
  background-position: 50% 50%, 50% 50%;
  animation: aurora 60s linear infinite;
}

/* Radial-Maske (oben rechts) — via data-radial="true" aktiv */
.ab-aurora.with-mask {
  -webkit-mask-image: radial-gradient(ellipse at 100% 0%, black 10%, transparent 70%);
  mask-image: radial-gradient(ellipse at 100% 0%, black 10%, transparent 70%);
}

/* After-Ebene für Tiefe */
.ab-aurora::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(100deg, #fff 0%, #fff 7%, transparent 10%, transparent 12%, #fff 16%),
    repeating-linear-gradient(100deg,
      var(--ab-c1) 10%, var(--ab-c2) 15%,
      var(--ab-c3) 20%, var(--ab-c4) 25%,
      var(--ab-c5) 30%);
  background-size: 200% 100%, 100% 100%;
  background-attachment: fixed;
  mix-blend-mode: difference;
  animation: aurora 60s linear infinite;
}

.ab-content {
  position: relative;
  z-index: 10;
}
</style>

<!-- data-radial="true" für Maske oben rechts -->
<div class="ab-wrap" data-radial="true">
  <div class="ab-aurora" id="ab-aurora"></div>

  <!-- ── Inhalt hier anpassen ── -->
  <div class="ab-content">
    <h1 style="font-size:clamp(2rem,6vw,4rem);font-weight:700;text-align:center;margin:0 0 1rem;">
      Überschrift hier
    </h1>
    <p style="text-align:center;color:#475569;max-width:500px;margin:0 auto;">
      Beschreibungstext unter der Überschrift.
    </p>
  </div>
  <!-- ── Ende Inhalt ── -->

</div>

<script>
(function () {
  var wrap   = document.querySelector('.ab-wrap');
  var aurora = document.getElementById('ab-aurora');
  if (wrap && aurora && wrap.dataset.radial === 'true') {
    aurora.classList.add('with-mask');
  }
})();
</script>
