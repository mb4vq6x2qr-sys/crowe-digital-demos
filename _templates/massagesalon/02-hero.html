<!-- ══════════════════════════════════════════════
   TEMPLATE — HERO (Massagesalon)
   Anpassen:
   - images/hero.jpg → Hauptbild (min. 1920×1080px)
   - hero-tag → Kategorie + Ort
   - h1 Slogan (2 Zeilen: normal + kursiv/gold)
   - hero-desc → Kurztext (2–3 Sätze)
   - hero-badge → z.B. 5★ Google, 10+ Jahre, o.ä.
   - btn-primary → CTA Ziel (#termin, #booking)
══════════════════════════════════════════════ -->

<!-- CSS (in <head>) -->
<style>
.hero {
  min-height: 100vh; position: relative;
  display: flex; align-items: center; overflow: hidden;
}
.hero-photo {
  position: absolute; inset: 0;
  background: url('images/hero.jpg') center center / cover no-repeat;
  animation: heroZoom 12s ease-out forwards;
}
@keyframes heroZoom {
  from { transform: scale(1.1); }
  to   { transform: scale(1.0); }
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(105deg, rgba(10,8,5,0.82) 0%, rgba(15,13,10,0.65) 45%, rgba(10,8,5,0.35) 100%);
}
.hero-gradient-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; height: 30%;
  background: linear-gradient(to top, var(--dark2), transparent);
}
.hero-content {
  position: relative; z-index: 2;
  max-width: 720px; padding: 0 5rem; margin-top: 90px;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 0.8rem;
  font-size: 0.68rem; letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 2rem;
  opacity: 0; animation: fadeUp 1s 0.3s ease forwards;
}
.hero-tag::before, .hero-tag::after {
  content: ''; display: block; width: 30px; height: 1px; background: var(--gold); opacity: 0.6;
}
.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3.2rem, 6.5vw, 6rem); font-weight: 300;
  line-height: 1.0; color: var(--cream); margin-bottom: 1.8rem;
  opacity: 0; animation: fadeUp 1.2s 0.5s ease forwards;
}
.hero h1 em { font-style: italic; color: var(--gold-light); display: block; }
.hero-desc {
  font-size: 0.95rem; line-height: 1.9; color: rgba(232,213,176,0.65);
  max-width: 480px; margin-bottom: 3rem; font-weight: 300;
  opacity: 0; animation: fadeUp 1s 0.8s ease forwards;
}
.hero-actions {
  display: flex; gap: 1.5rem; align-items: center;
  opacity: 0; animation: fadeUp 1s 1s ease forwards;
}
.btn-primary {
  background: var(--gold); color: var(--dark);
  padding: 1rem 2.8rem; text-decoration: none;
  font-size: 0.75rem; font-weight: 600; letter-spacing: 0.15em;
  text-transform: uppercase; border-radius: 1px; transition: all 0.35s;
  position: relative; overflow: hidden;
}
.btn-primary::before {
  content: ''; position: absolute; inset: 0;
  background: var(--gold-light); transform: translateX(-100%); transition: transform 0.35s;
}
.btn-primary:hover::before { transform: translateX(0); }
.btn-primary span { position: relative; z-index: 1; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(201,169,110,0.35); }
.btn-ghost {
  color: rgba(232,213,176,0.75); text-decoration: none;
  font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
  display: flex; align-items: center; gap: 0.8rem; transition: color 0.3s;
  border-bottom: 1px solid rgba(201,169,110,0.3); padding-bottom: 2px;
}
.btn-ghost:hover { color: var(--gold); border-color: var(--gold); }
.hero-badge {
  position: absolute; right: 5%; top: 50%; transform: translateY(-50%); z-index: 2;
  width: 120px; height: 120px; border-radius: 50%;
  border: 1px solid rgba(201,169,110,0.3);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  opacity: 0; animation: fadeIn 1s 1.5s ease forwards;
  background: rgba(10,8,5,0.4); backdrop-filter: blur(8px);
}
.hero-badge-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem; font-weight: 300; color: var(--gold); line-height: 1;
}
.hero-badge-label {
  font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(232,213,176,0.5); margin-top: 0.3rem; line-height: 1.4;
}
.scroll-hint {
  position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); z-index: 3;
  display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
  opacity: 0; animation: fadeIn 1s 1.8s ease forwards;
}
.scroll-line {
  width: 1px; height: 48px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  animation: scrollPulse 2.5s infinite;
}
@keyframes scrollPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
.scroll-text { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(201,169,110,0.6); }
@media (max-width: 768px) {
  .hero-content { padding: 0 1.5rem; }
  .hero-badge { display: none; }
}
</style>

<!-- HTML -->
<section class="hero">
  <div class="hero-photo"></div><!-- Bild via CSS: background: url('images/hero.jpg') -->
  <div class="hero-overlay"></div>
  <div class="hero-gradient-bottom"></div>
  <div class="hero-content">
    <div class="hero-tag">[KATEGORIE] · [STADT], [KANTON]</div>
    <h1>
      <span>[HAUPTZEILE DES SLOGANS]</span>
      <em>[KURSIVE GOLDENE ZEILE]</em>
    </h1>
    <p class="hero-desc">
      [Beschreibung in 2–3 Sätzen. Was macht diesen Salon besonders?
      Welche Massagen? Welches Gefühl? Welche Herkunft der Technik?]
    </p>
    <div class="hero-actions">
      <a href="#termin" class="btn-primary"><span>Jetzt Termin buchen</span></a>
      <a href="#massagen" class="btn-ghost">Alle Massagen entdecken</a>
    </div>
  </div>
  <div class="hero-badge">
    <div class="hero-badge-num">5★</div>
    <div class="hero-badge-label">Google<br>Bewertung</div>
  </div>
  <div class="scroll-hint">
    <div class="scroll-line"></div>
    <span class="scroll-text">Entdecken</span>
  </div>
</section>
