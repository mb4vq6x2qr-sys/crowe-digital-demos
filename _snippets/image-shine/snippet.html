<!-- ══════════════════════════════════════════════
   SNIPPET — IMAGE SHINE HOVER
   Quelle: assgmbh.ch Design-Pattern
   
   Beim Hover gleitet ein diagonaler weisser Schimmer
   über das Bild (wie Lichtreflex).
   Einfach .img-shine auf jeden Container mit Bild setzen.
══════════════════════════════════════════════ -->

<style>
.img-shine {
  position: relative;
  overflow: hidden;
  display: block; /* oder inline-block */
}
.img-shine img {
  display: block;
  width: 100%;
  transition: transform 0.5s ease;
}
.img-shine:hover img { transform: scale(1.03); }
.img-shine::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 60%; height: 0%;
  background: rgba(255,255,255,0.25);
  transform: translate(-50%, -50%) rotate(-45deg);
  transition: height 600ms linear;
  pointer-events: none;
}
.img-shine:hover::after { height: 250%; }
</style>

<!-- Verwendung -->
<div class="img-shine" style="border-radius: 12px;">
  <img src="images/beispiel.jpg" alt="Beschreibung"><!-- Foto ersetzen -->
</div>
