<!-- ══════════════════════════════════════════════
   SNIPPET — FLOATING DOCK
   Quelle: aceternity.com/components/floating-dock

   Desktop: Icon-Leiste unten Mitte, Icons vergrössern
            sich wenn Cursor nähert (macOS-Dock-Effekt)
   Mobile:  Aufklapp-Button unten rechts

   Anpassen:
   - ITEMS Array im <script>: title, href, icon (SVG-String)
   - MIN_SIZE / MAX_SIZE: Icon-Grösse in px
   - Farben: --fd-bg, --fd-icon-bg in :root
══════════════════════════════════════════════ -->

<style>
:root {
  --fd-bg:      #f9fafb;
  --fd-icon-bg: #e5e7eb;
  --fd-shadow:  0 4px 24px rgba(0,0,0,0.12);
}

/* Desktop */
.fd-desktop {
  position: fixed; bottom: 1rem; left: 50%;
  transform: translateX(-50%);
  display: none; /* JS aktiviert via media query */
  align-items: flex-end;
  gap: 0.75rem;
  background: var(--fd-bg);
  border-radius: 1.25rem;
  padding: 0.75rem 1rem 0.5rem;
  z-index: 200;
  box-shadow: var(--fd-shadow);
}
@media (min-width: 768px) { .fd-desktop { display: flex; } }

.fd-icon-link { text-decoration: none; flex-shrink: 0; }
.fd-icon-wrap {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--fd-icon-bg);
  width: 40px; height: 40px;
  cursor: pointer;
  transition: background 0.2s;
}
.fd-icon-wrap:hover { background: #d1d5db; }
.fd-icon-inner {
  display: flex; align-items: center; justify-content: center;
  width: 20px; height: 20px;
  pointer-events: none;
}
.fd-icon-inner svg { width: 100%; height: 100%; color: #404040; }

.fd-tooltip {
  position: absolute;
  bottom: calc(100% + 8px); left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: #f3f4f6;
  border: 1px solid #e5e7eb;
  border-radius: 0.375rem;
  padding: 2px 8px;
  font-size: 0.7rem;
  white-space: nowrap;
  color: #404040;
  font-family: inherit;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.fd-icon-wrap:hover .fd-tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Mobile */
.fd-mobile {
  position: fixed; bottom: 1rem; right: 1rem;
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 0.5rem;
  z-index: 200;
}
@media (min-width: 768px) { .fd-mobile { display: none; } }

.fd-mobile-items { display: none; flex-direction: column; gap: 0.5rem; align-items: flex-end; }
.fd-mobile-item {
  width: 2.5rem; height: 2.5rem; border-radius: 50%;
  background: var(--fd-bg);
  display: flex; align-items: center; justify-content: center;
  text-decoration: none;
  box-shadow: var(--fd-shadow);
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.fd-mobile-item svg { width: 1rem; height: 1rem; color: #404040; }
.fd-mobile-item.visible { opacity: 1; transform: translateY(0); }

.fd-mobile-btn {
  width: 2.5rem; height: 2.5rem; border-radius: 50%;
  background: var(--fd-bg); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--fd-shadow);
}
.fd-mobile-btn svg { width: 1.25rem; height: 1.25rem; color: #404040; }
</style>

<!-- Container (JS befüllt diese) -->
<div class="fd-desktop" id="fd-desktop"></div>
<div class="fd-mobile" id="fd-mobile">
  <div class="fd-mobile-items" id="fd-mobile-items"></div>
  <button class="fd-mobile-btn" id="fd-mobile-btn" aria-label="Menü">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</div>

<script>
(function () {
  /* ── Items hier anpassen ── */
  var ITEMS = [
    {
      title: "Start",
      href: "#",
      icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'
    },
    {
      title: "Massagen",
      href: "#massagen",
      icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 11V6a2 2 0 00-4 0v5M14 10V4a2 2 0 00-4 0v6M10 10.5V6a2 2 0 00-4 0v8.5M18 8a2 2 0 114 0v6a8 8 0 01-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 012.83-2.82L7 15"/></svg>'
    },
    {
      title: "Galerie",
      href: "#galerie",
      icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'
    },
    {
      title: "Über uns",
      href: "#about",
      icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
    },
    {
      title: "Termin",
      href: "#termin",
      icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
    }
  ];

  var MIN_SIZE = 40, MAX_SIZE = 80;
  var MIN_ICON = 20, MAX_ICON = 40;
  var RANGE    = 150; /* px ab Mitte bis kein Effekt mehr */

  /* Spring-Physik (mass 0.1, stiffness 150, damping 12) */
  function spring(s, dt) {
    s.velocity += ((s.target - s.value) * 150 - s.velocity * 12) / 0.1 * (dt / 1000);
    s.velocity  = Math.max(-2000, Math.min(2000, s.velocity)); /* Clamp */
    s.value    += s.velocity * (dt / 1000);
    return s.value;
  }
  function mk(v) { return { value: v, target: v, velocity: 0 }; }
  function dist2size(d, lo, hi) {
    var t = Math.max(0, 1 - Math.abs(d) / RANGE);
    return lo + (hi - lo) * t;
  }

  /* ── Desktop aufbauen ── */
  var dock    = document.getElementById('fd-desktop');
  var mouseX  = null;
  var springs = [];

  ITEMS.forEach(function (item) {
    var a    = document.createElement('a');
    a.href   = item.href;
    a.className = 'fd-icon-link';

    var wrap    = document.createElement('div');  wrap.className = 'fd-icon-wrap';
    var inner   = document.createElement('div');  inner.className = 'fd-icon-inner';
    inner.innerHTML = item.icon;
    var tip     = document.createElement('div');  tip.className = 'fd-tooltip';
    tip.textContent = item.title;

    wrap.appendChild(inner);
    wrap.appendChild(tip);
    a.appendChild(wrap);
    dock.appendChild(a);

    springs.push({ wrap: wrap, inner: inner,
      w: mk(MIN_SIZE), h: mk(MIN_SIZE), wi: mk(MIN_ICON), hi: mk(MIN_ICON) });
  });

  dock.addEventListener('mousemove',  function (e) { mouseX = e.clientX; });
  dock.addEventListener('mouseleave', function ()   { mouseX = null; });

  var last = 0;
  (function tick(t) {
    var dt = Math.min(t - last, 32) || 16; last = t;
    springs.forEach(function (s) {
      var r    = s.wrap.getBoundingClientRect();
      var d    = mouseX !== null ? mouseX - (r.left + r.width / 2) : Infinity;
      s.w.target  = s.h.target  = dist2size(d, MIN_SIZE, MAX_SIZE);
      s.wi.target = s.hi.target = dist2size(d, MIN_ICON, MAX_ICON);
      s.wrap.style.width   = spring(s.w,  dt) + 'px';
      s.wrap.style.height  = spring(s.h,  dt) + 'px';
      s.inner.style.width  = spring(s.wi, dt) + 'px';
      s.inner.style.height = spring(s.hi, dt) + 'px';
    });
    requestAnimationFrame(tick);
  })(0);

  /* ── Mobile aufbauen ── */
  var mItems  = document.getElementById('fd-mobile-items');
  var mBtn    = document.getElementById('fd-mobile-btn');
  var isOpen  = false;

  ITEMS.forEach(function (item) {
    var a = document.createElement('a');
    a.href = item.href; a.className = 'fd-mobile-item';
    a.innerHTML = item.icon;
    mItems.appendChild(a);
  });

  mBtn.addEventListener('click', function () {
    isOpen = !isOpen;
    var els = mItems.querySelectorAll('.fd-mobile-item');
    if (isOpen) {
      mItems.style.display = 'flex';
      els.forEach(function (el, i) {
        setTimeout(function () { el.classList.add('visible'); },
          (els.length - 1 - i) * 50);
      });
    } else {
      els.forEach(function (el, i) {
        setTimeout(function () { el.classList.remove('visible'); }, i * 50);
      });
      setTimeout(function () { mItems.style.display = 'none'; },
        els.length * 50 + 200);
    }
  });
})();
</script>
