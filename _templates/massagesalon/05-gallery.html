<!-- ══════════════════════════════════════════════
   TEMPLATE — GALERIE (Massagesalon)
   Layout: 1 grosses Bild links, 4 kleinere rechts (2×2)
   Anpassen:
   - Bildpfade (images/gallery-*.jpg)
   - Alt-Texte
   - section-title
   - Bilder min. 800×600px empfohlen
══════════════════════════════════════════════ -->

<!-- CSS (in <head>) -->
<style>
.gallery { background: var(--dark2); padding: 8rem 0; }
.gallery .section-tag { color: var(--cream); }
.gallery .section-title { color: var(--cream); }
.gallery .section-title em { color: var(--gold); }
.gallery-header { padding: 0 4rem; margin-bottom: 4rem; }
.gallery-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  grid-template-rows: 320px 320px;
  gap: 4px;
  max-width: 1400px; margin: 0 auto;
}
.gallery-item { overflow: hidden; position: relative; cursor: pointer; }
.gallery-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.5s;
  filter: brightness(0.9) saturate(1.1);
}
.gallery-item:hover img { transform: scale(1.08); filter: brightness(1) saturate(1.2); }
.gallery-item-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,8,5,0.5), transparent);
  opacity: 0; transition: opacity 0.4s;
}
.gallery-item:hover .gallery-item-overlay { opacity: 1; }
.gallery-item.large { grid-row: 1 / 3; }
@media (max-width: 1024px) {
  .gallery-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
  .gallery-item.large { grid-row: auto; }
}
@media (max-width: 768px) {
  .gallery-grid { grid-template-columns: 1fr; grid-template-rows: auto; }
}
</style>

<!-- HTML -->
<section id="galerie" class="gallery">
  <div class="gallery-header">
    <span class="section-tag reveal">Unser Spa</span>
    <h2 class="section-title reveal">Erleben Sie die <em>Atmosphäre</em></h2>
  </div>
  <div class="gallery-grid">
    <!-- Grosses Bild links (2 Zeilen hoch) -->
    <div class="gallery-item large reveal">
      <img src="images/gallery-main.jpg" alt="[SALON_NAME] – Empfang"><!-- Foto ersetzen -->
      <div class="gallery-item-overlay"></div>
    </div>
    <!-- 4 kleinere Bilder rechts -->
    <div class="gallery-item reveal reveal-delay-1">
      <img src="images/gallery-1.jpg" alt="Behandlungsraum"><!-- Foto ersetzen -->
      <div class="gallery-item-overlay"></div>
    </div>
    <div class="gallery-item reveal reveal-delay-2">
      <img src="images/gallery-2.jpg" alt="[BESCHREIBUNG]"><!-- Foto ersetzen -->
      <div class="gallery-item-overlay"></div>
    </div>
    <div class="gallery-item reveal reveal-delay-1">
      <img src="images/gallery-3.jpg" alt="[BESCHREIBUNG]"><!-- Foto ersetzen -->
      <div class="gallery-item-overlay"></div>
    </div>
    <div class="gallery-item reveal reveal-delay-2">
      <img src="images/gallery-4.jpg" alt="[BESCHREIBUNG]"><!-- Foto ersetzen -->
      <div class="gallery-item-overlay"></div>
    </div>
  </div>
</section>
