<!-- ══════════════════════════════════════════════
   SNIPPET — MODAL SYSTEM (CSS + JS)
   Basis-CSS und JS für alle Modals auf der Seite.
   Einmal einbinden, dann beliebig viele Modals verwenden.
   Voraussetzung: data-modal="[id]" auf Trigger-Links,
                  id="modal-[id]" auf Modal-Divs
══════════════════════════════════════════════ -->

<!-- CSS — in <style> im <head> -->
<style>
.modal {
  display: none; position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.72);
  align-items: center; justify-content: center; padding: 1.5rem;
}
.modal.open { display: flex; }
.modal-inner {
  background: #1a1510; max-width: 660px; width: 100%;
  max-height: 82vh; overflow-y: auto;
  padding: 3rem; position: relative;
  border: 1px solid rgba(201,169,110,0.18);
  scrollbar-width: thin; scrollbar-color: rgba(201,169,110,0.2) transparent;
}
.modal-close {
  position: absolute; top: 1.2rem; right: 1.5rem;
  background: none; border: none; color: rgba(232,213,176,0.4);
  font-size: 1.3rem; cursor: pointer; line-height: 1; transition: color 0.3s;
}
.modal-close:hover { color: var(--gold, #c9a96e); }
.modal-title {
  font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400;
  color: var(--cream, #f7f2ea); margin-bottom: 2rem; padding-bottom: 1rem;
  border-bottom: 1px solid rgba(201,169,110,0.15);
}
.modal-body h3 {
  font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600;
  color: var(--gold, #c9a96e); margin: 1.8rem 0 0.5rem;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.modal-body p, .modal-body li {
  color: rgba(232,213,176,0.6); font-size: 0.83rem; line-height: 1.85;
}
.modal-body ul { padding-left: 1.2rem; margin: 0.4rem 0; }
.modal-body strong { color: rgba(232,213,176,0.85); font-weight: 500; }
.modal-body a { color: var(--gold, #c9a96e); }
.modal-note {
  margin-top: 2rem; padding-top: 1rem;
  border-top: 1px solid rgba(201,169,110,0.1);
  font-size: 0.72rem; color: rgba(232,213,176,0.25); font-style: italic;
}
</style>

<!-- JS — im Script-Block am Ende -->
<script>
function openModal(id) {
  document.getElementById('modal-' + id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(modal) {
  modal.classList.remove('open');
  document.body.style.overflow = '';
}
document.querySelectorAll('[data-modal]').forEach(el => {
  el.addEventListener('click', e => { e.preventDefault(); openModal(el.dataset.modal); });
});
document.querySelectorAll('.modal').forEach(modal => {
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(modal); });
});
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeModal(btn.closest('.modal')));
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal.open').forEach(closeModal);
});
</script>
