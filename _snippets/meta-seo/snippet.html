<!-- ══════════════════════════════════════════════
   SNIPPET — SEO META TAGS
   Nur für echte Websites, nicht für Demos.
   Anpassen: alle [PLATZHALTER]
   Tipp: Description max. 155 Zeichen
══════════════════════════════════════════════ -->

<!-- In <head> einfügen -->
<meta name="description" content="[KURZBESCHREIBUNG DES ANGEBOTS] – [ORT]. [USP in einem Satz.]">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://[DOMAIN.CH]/">

<!-- Open Graph (für Social Media Vorschau) -->
<meta property="og:title" content="[SEITENTITEL] – [ORT]">
<meta property="og:description" content="[KURZBESCHREIBUNG]">
<meta property="og:image" content="https://[DOMAIN.CH]/images/og-image.jpg">
<!-- og:image empfohlen: 1200×630px -->
<meta property="og:url" content="https://[DOMAIN.CH]/">
<meta property="og:type" content="website">
<meta property="og:locale" content="de_CH">

<!-- Structured Data (LocalBusiness) — optional aber wertvoll für Google -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HealthAndBeautyBusiness",
  "name": "[FIRMENNAME]",
  "description": "[KURZBESCHREIBUNG]",
  "url": "https://[DOMAIN.CH]",
  "telephone": "[TELEFON]",
  "email": "[EMAIL]",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "[STRASSE NR]",
    "addressLocality": "[ORT]",
    "postalCode": "[PLZ]",
    "addressCountry": "CH"
  },
  "openingHours": [
    "Mo-Fr 10:00-20:00",
    "Sa 10:00-18:00"
  ],
  "priceRange": "CHF 60–190"
}
</script>
<!-- @type Optionen: MassageTherapist / DaySpa / BeautySalon / HealthAndBeautyBusiness -->
