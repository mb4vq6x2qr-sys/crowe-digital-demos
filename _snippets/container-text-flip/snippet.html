<!-- ══════════════════════════════════════════════
   SNIPPET — CONTAINER TEXT FLIP
   Quelle: aceternity.com/components/container-text-flip

   Wechselt Wörter mit Blur-Einblend-Animation.
   Container-Breite passt sich automatisch ans aktive Wort an.

   Anpassen:
   - data-words: JSON Array der Wörter
   - data-interval: Millisekunden zwischen Wechseln (Standard: 3000)
   - data-duration: Animationsdauer in ms (Standard: 700)
   - Schriftgrösse / Farben in .ctf-container
══════════════════════════════════════════════ -->

<style>
.ctf-container {
  display: inline-block;
  border-radius: 0.5rem;
  padding: 0.5rem 0 0.75rem;
  text-align: center;
  font-size: clamp(2rem, 6vw, 4.5rem);
  font-weight: 700;
  color: #000;
  font-family: inherit;
  background: linear-gradient(to bottom, #f3f4f6, #e5e7eb);
  box-shadow:
    inset 0 -1px #d1d5db,
    inset 0 0 0 1px #d1d5db,
    0 4px 8px #d1d5db;
  white-space: nowrap;
  overflow: hidden;
  /* Breite wird per JS animiert */
  transition: width 0.35s ease;
}
.ctf-word {
  display: inline-block;
  padding: 0 15px;
}
.ctf-letter {
  display: inline-block;
  opacity: 0;
  filter: blur(10px);
  transition: opacity 0.2s ease, filter 0.2s ease;
}
.ctf-letter.visible {
  opacity: 1;
  filter: blur(0);
}
</style>

<!-- Wörter und Timing via data-Attribute -->
<span
  class="ctf-container"
  data-words='["entspannt", "erholt", "wohlig", "glücklich"]'
  data-interval="3000"
  data-duration="700"
  id="ctf-1"
>
  <span class="ctf-word" id="ctf-1-text"></span>
</span>

<script>
(function () {
  document.querySelectorAll('.ctf-container').forEach(function (container) {
    var textEl   = container.querySelector('.ctf-word');
    var words    = JSON.parse(container.dataset.words    || '["schön","modern","toll"]');
    var interval = parseInt(container.dataset.interval  || 3000);
    var duration = parseInt(container.dataset.duration  || 700);
    var index    = 0;

    function showWord(word) {
      /* Buchstaben rendern */
      textEl.innerHTML = word.split('').map(function (l) {
        return '<span class="ctf-letter">' + (l === ' ' ? '&nbsp;' : l) + '</span>';
      }).join('');

      /* Breite messen + animieren */
      var tempWidth = textEl.scrollWidth + 30;
      container.style.width = tempWidth + 'px';

      /* Buchstaben mit Verzögerung einblenden */
      textEl.querySelectorAll('.ctf-letter').forEach(function (el, i) {
        setTimeout(function () {
          el.classList.add('visible');
        }, i * 20);
      });
    }

    function next() {
      /* Buchstaben ausblenden */
      textEl.querySelectorAll('.ctf-letter').forEach(function (el) {
        el.classList.remove('visible');
      });
      setTimeout(function () {
        index = (index + 1) % words.length;
        showWord(words[index]);
      }, duration / 2);
    }

    /* Init */
    container.style.width = '100px'; /* Startwert */
    showWord(words[0]);
    setInterval(next, interval);
  });
})();
</script>
