<!-- ══════════════════════════════════════════════
   SNIPPET — 3D MARQUEE
   Quelle: aceternity.com/components/3d-marquee

   Isometrisches Bilder-Grid (rotateX 55° rotateZ -45°).
   4 Spalten, abwechselnd hoch/runter scrollend.
   Hover: Bild hebt sich leicht an.
   Gestrichelte Rasterlinien an jedem Bild/Spalte.

   Anpassen:
   - IMAGES Array im <script> (min. 8 Bilder, 12+ ideal)
   - .tdm-outer height für Gesamthöhe (Standard: 600px)
   - --tdm-line für Farbe der Rasterlinien
   - Animationsgeschwindigkeit: animation-duration in .tdm-col
══════════════════════════════════════════════ -->

<style>
:root { --tdm-line: rgba(0,0,0,0.2); }

.tdm-outer {
  display: block;
  height: 600px;
  overflow: hidden;
  border-radius: 1rem;
  margin: 0 auto;
}
@media (max-width: 640px) { .tdm-outer { height: 400px; } }

.tdm-center {
  display: flex;
  width: 100%; height: 100%;
  align-items: center; justify-content: center;
}

/* 1720×1720px Box, skaliert je nach Viewport */
.tdm-scaler {
  width: 1720px; height: 1720px;
  flex-shrink: 0;
  transform: scale(0.5);
}
@media (min-width: 640px)  { .tdm-scaler { transform: scale(0.75); } }
@media (min-width: 1024px) { .tdm-scaler { transform: scale(1); } }

/* 3D Grid */
.tdm-grid {
  position: relative;
  top: 24rem; right: 50%;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2rem;
  width: 100%; height: 100%;
  transform-origin: top left;
  transform-style: preserve-3d;
  transform: rotateX(55deg) rotateY(0deg) rotateZ(-45deg);
}

/* Spalten-Animation */
.tdm-col {
  display: flex; flex-direction: column;
  align-items: flex-start; gap: 2rem;
  position: relative;
}
.tdm-col.down { animation: tdmDown 10s ease-in-out infinite alternate; }
.tdm-col.up   { animation: tdmUp   15s ease-in-out infinite alternate; }
@keyframes tdmDown { from { transform: translateY(0); } to { transform: translateY(100px); } }
@keyframes tdmUp   { from { transform: translateY(0); } to { transform: translateY(-100px); } }

/* Bild */
.tdm-img-wrap { position: relative; width: 100%; }
.tdm-img {
  display: block;
  width: 100%;
  aspect-ratio: 970 / 700;
  object-fit: cover;
  border-radius: 0.5rem;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.05);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.tdm-img:hover { transform: translateY(-10px); box-shadow: 0 24px 48px rgba(0,0,0,0.15); }

/* Rasterlinien — horizontal (oben an jedem Bild) */
.tdm-hline {
  position: absolute;
  top: -1rem; left: -10px;
  width: calc(100% + 20px);
  height: 1px;
  background: repeating-linear-gradient(
    to right,
    var(--tdm-line) 0, var(--tdm-line) 2.5px,
    transparent 2.5px, transparent 5px
  );
  -webkit-mask: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
  mask: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
  z-index: 30;
}

/* Rasterlinien — vertikal (links an jeder Spalte) */
.tdm-vline {
  position: absolute;
  left: -1rem; top: -40px;
  width: 1px;
  height: calc(100% + 80px);
  background: repeating-linear-gradient(
    to bottom,
    var(--tdm-line) 0, var(--tdm-line) 2.5px,
    transparent 2.5px, transparent 5px
  );
  -webkit-mask: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
  mask: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
  z-index: 30;
}
</style>

<div class="tdm-outer">
  <div class="tdm-center">
    <div class="tdm-scaler">
      <div class="tdm-grid" id="tdm-grid"></div>
    </div>
  </div>
</div>

<script>
(function () {
  /* ── Bilder hier anpassen (min. 8, ideal 12–16) ── */
  var IMAGES = [
    "images/gallery-main.jpg",  /* Foto ersetzen */
    "images/gallery-1.jpg",
    "images/gallery-2.jpg",
    "images/gallery-3.jpg",
    "images/gallery-4.jpg",
    "images/massagen/m-01.jpg",
    "images/massagen/m-02.jpg",
    "images/massagen/m-03.jpg",
    "images/massagen/m-04.jpg",
    "images/massagen/m-05.jpg",
    "images/massagen/m-06.jpg",
    "images/about.jpg"
  ];

  var grid      = document.getElementById('tdm-grid');
  var chunkSize = Math.ceil(IMAGES.length / 4);

  for (var col = 0; col < 4; col++) {
    var chunk  = IMAGES.slice(col * chunkSize, col * chunkSize + chunkSize);
    var colEl  = document.createElement('div');
    colEl.className = 'tdm-col ' + (col % 2 === 0 ? 'down' : 'up');

    /* Vertikale Rasterlinie pro Spalte */
    var vline = document.createElement('div');
    vline.className = 'tdm-vline';
    colEl.appendChild(vline);

    chunk.forEach(function (src, i) {
      var wrap = document.createElement('div');
      wrap.className = 'tdm-img-wrap';

      var hline = document.createElement('div');
      hline.className = 'tdm-hline';

      var img = document.createElement('img');
      img.src = src;
      img.alt = 'Bild ' + (i + 1);
      img.className = 'tdm-img';
      img.loading = 'lazy';

      wrap.appendChild(hline);
      wrap.appendChild(img);
      colEl.appendChild(wrap);
    });

    grid.appendChild(colEl);
  }
})();
</script>
