<!-- ══════════════════════════════════════════════
   TEMPLATE — CSS BASIS & DESIGN-SYSTEM (Massagesalon)
   Kopieren in den <head> jeder neuen Massagesalon-Seite.
   Enthält: CSS-Variablen, Reset, Typo, Section-Base,
            Divider, Scroll-Reveal, Animationen
   Farben anpassen via :root Variablen.
══════════════════════════════════════════════ -->

<!-- Google Fonts — in <head> vor dem Style-Tag -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ── VARIABLEN — Hier Farben anpassen ── */
:root {
  --gold:       #c9a96e;   /* Hauptakzentfarbe */
  --gold-light: #e8d5b0;   /* Helles Gold (Hover) */
  --gold-deep:  #a8844a;   /* Dunkles Gold (Divider) */
  --dark:       #0f0d0a;   /* Tiefstes Schwarz */
  --dark2:      #1a1510;   /* Dunkler Hintergrund (Gallery, Modals) */
  --warm:       #221c14;   /* Warmes Dunkel (Stats, Hours) */
  --cream:      #f7f2ea;   /* Haupthintergrund hell */
  --cream2:     #ede4d3;   /* Etwas dunkler Creme (Pillars) */
  --text:       #3d3228;   /* Haupttext */
  --text-light: #7a6a58;   /* Grauer Text (Beschreibungen) */
  --green:      #2d4a2a;   /* Optional (nicht immer genutzt) */
}

/* ── RESET ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Jost', sans-serif;
  background: var(--cream); color: var(--text); overflow-x: hidden;
}

/* ── SECTION BASIS ── */
section { padding: 8rem 4rem; }
.section-tag {
  display: block; font-size: 0.68rem; letter-spacing: 0.35em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 1rem; text-align: center;
}
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.4rem, 4vw, 3.8rem);
  font-weight: 300; text-align: center; color: var(--dark);
  line-height: 1.1; margin-bottom: 1.2rem;
}
.section-title em { font-style: italic; color: var(--gold); }
.section-sub {
  text-align: center; color: var(--text-light);
  font-size: 0.9rem; line-height: 1.9; max-width: 560px;
  margin: 0 auto 5rem; font-weight: 300;
}

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: 1rem;
  margin: 0 auto 4rem; max-width: 220px;
}
.divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-deep)); }
.divider-line.r { background: linear-gradient(to left, transparent, var(--gold-deep)); }
.divider-icon { color: var(--gold); font-size: 1rem; opacity: 0.7; }

/* ── SCROLL REVEAL ── */
.reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.9s ease, transform 0.9s ease; }
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }

/* ── ANIMATIONEN ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}

/* ── RESPONSIVE SECTION ── */
@media (max-width: 768px) { section { padding: 5rem 1.5rem; } }
</style>

<!-- JS — Scroll Reveal Observer (am Ende der Seite einfügen) -->
<script>
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
  });
}, { threshold: 0.08 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
