<!-- ══════════════════════════════════════════════
   SNIPPET — ANIMATED TESTIMONIALS
   Quelle: aceternity.com/components/animated-testimonials

   Bild-Stack links, Text + Navigation rechts.
   Bilder: gestapelt, aktives Bild springt hoch (y-Animation)
   Text: per Wort eingeblendet (blur → scharf)
   Autoplay: data-autoplay="true" für 5s-Intervall

   Anpassen:
   - testimonials Array im <script> (quote, name, designation, src)
   - Farben: --at-bg, --at-text, --at-subtext, --at-btn
══════════════════════════════════════════════ -->

<style>
.at-wrap {
  max-width: 56rem;
  margin: 0 auto;
  padding: 5rem 1rem;
  font-family: sans-serif;
  -webkit-font-smoothing: antialiased;
}
.at-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2rem;
}
@media (min-width: 768px) {
  .at-grid { grid-template-columns: 1fr 1fr; gap: 5rem; }
}
/* Bilder-Stack */
.at-images {
  position: relative;
  height: 20rem;
  width: 100%;
}
.at-img-card {
  position: absolute;
  inset: 0;
  border-radius: 1.5rem;
  overflow: hidden;
  transform-origin: bottom center;
  transition: opacity 0.4s ease, transform 0.4s ease;
  will-change: transform, opacity;
}
.at-img-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  user-select: none;
  pointer-events: none;
}
/* Text-Seite */
.at-content {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 1rem 0;
}
.at-name {
  font-size: 1.5rem;
  font-weight: 700;
  color: #000;
  margin: 0 0 0.25rem;
}
.at-designation {
  font-size: 0.875rem;
  color: #6b7280;
  margin: 0 0 2rem;
}
.at-quote {
  font-size: 1rem;
  color: #6b7280;
  line-height: 1.7;
  margin: 0;
}
.at-quote .at-word {
  display: inline-block;
  opacity: 0;
  filter: blur(8px);
  transform: translateY(4px);
  transition: opacity 0.2s ease, filter 0.2s ease, transform 0.2s ease;
}
.at-quote .at-word.visible {
  opacity: 1;
  filter: blur(0);
  transform: translateY(0);
}
/* Buttons */
.at-nav {
  display: flex;
  gap: 1rem;
  padding-top: 3rem;
}
.at-btn {
  width: 1.75rem;
  height: 1.75rem;
  border-radius: 50%;
  background: #f3f4f6;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.at-btn svg { width: 1.1rem; height: 1.1rem; color: #000; }
.at-btn:first-child:hover svg { transform: rotate(12deg); }
.at-btn:last-child:hover svg  { transform: rotate(-12deg); }
</style>

<!-- Testimonials hier konfigurieren -->
<div class="at-wrap" data-autoplay="false">
  <div class="at-grid">
    <div class="at-images" id="at-images"></div>
    <div class="at-content">
      <div id="at-text"></div>
      <div class="at-nav">
        <button class="at-btn" id="at-prev" aria-label="Zurück">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <button class="at-btn" id="at-next" aria-label="Weiter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  /* ── Testimonials hier anpassen ── */
  var testimonials = [
    {
      name: "Maria K.",
      designation: "Reinach BL",
      quote: "Die beste Massage die ich je hatte. Absolut professionell und wohlthuend – ich komme immer wieder.",
      src: "images/testimonials/t-01.jpg" /* Foto ersetzen */
    },
    {
      name: "Thomas B.",
      designation: "Therwil",
      quote: "Traumhafte Atmosphäre, herzliche Betreuung. Die Kräuterstempel-Massage hat meine Verspannungen sofort gelöst.",
      src: "images/testimonials/t-02.jpg" /* Foto ersetzen */
    },
    {
      name: "Sandra M.",
      designation: "Basel",
      quote: "Endlich ein Ort wo man wirklich abschalten kann. Ich empfehle Crystal Thai Spa jedem weiter.",
      src: "images/testimonials/t-03.jpg" /* Foto ersetzen */
    }
  ];

  var active = 0;
  var imgContainer = document.getElementById('at-images');
  var textContainer = document.getElementById('at-text');
  var autoplay = document.querySelector('.at-wrap').dataset.autoplay === 'true';
  var rotations = testimonials.map(function () {
    return Math.floor(Math.random() * 21) - 10;
  });
  var timer = null;

  function render() {
    /* Bilder */
    imgContainer.innerHTML = '';
    testimonials.forEach(function (t, i) {
      var isAct = i === active;
      var card = document.createElement('div');
      card.className = 'at-img-card';
      card.style.zIndex = isAct ? 40 : (testimonials.length + 2 - i);
      card.style.opacity = isAct ? '1' : '0.7';
      card.style.transform = isAct
        ? 'scale(1) rotate(0deg) translateZ(0)'
        : 'scale(0.95) rotate(' + rotations[i] + 'deg) translateZ(-100px)';
      if (isAct) {
        card.style.transition = 'none';
        setTimeout(function () {
          card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          card.style.transform = 'scale(1) rotate(0deg)';
        }, 10);
      }
      var img = document.createElement('img');
      img.src = t.src;
      img.alt = t.name;
      img.draggable = false;
      card.appendChild(img);
      imgContainer.appendChild(card);
    });

    /* Text */
    var t = testimonials[active];
    var words = t.quote.split(' ');
    textContainer.innerHTML =
      '<h3 class="at-name">' + t.name + '</h3>' +
      '<p class="at-designation">' + t.designation + '</p>' +
      '<p class="at-quote">' +
        words.map(function (w) {
          return '<span class="at-word">' + w + '</span>';
        }).join(' ') +
      '</p>';

    /* Wörter mit Verzögerung einblenden */
    textContainer.querySelectorAll('.at-word').forEach(function (el, i) {
      setTimeout(function () { el.classList.add('visible'); }, 20 * i);
    });
  }

  function next() {
    rotations[active] = Math.floor(Math.random() * 21) - 10;
    active = (active + 1) % testimonials.length;
    render();
  }
  function prev() {
    rotations[active] = Math.floor(Math.random() * 21) - 10;
    active = (active - 1 + testimonials.length) % testimonials.length;
    render();
  }

  document.getElementById('at-next').addEventListener('click', function () {
    next();
    if (autoplay) { clearInterval(timer); timer = setInterval(next, 5000); }
  });
  document.getElementById('at-prev').addEventListener('click', function () {
    prev();
    if (autoplay) { clearInterval(timer); timer = setInterval(next, 5000); }
  });

  if (autoplay) timer = setInterval(next, 5000);

  render();
})();
</script>
