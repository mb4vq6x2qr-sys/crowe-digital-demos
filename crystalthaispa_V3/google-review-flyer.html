  <style>
    @page {
      size: A5 portrait;
      margin: 0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 148mm;
      height: 210mm;
      font-family: 'Jost', sans-serif;
      background: #fff;
      overflow: hidden;
    }

    .card {
      width: 148mm;
      height: 210mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 10mm 10mm 8mm;
      position: relative;
      background: #fff;
    }

    /* Goldene Rahmen-Linien oben und unten */
    .card::before, .card::after {
      content: '';
      position: absolute;
      left: 8mm; right: 8mm;
      height: 1px;
      background: linear-gradient(to right, transparent, #C9A96E, transparent);
    }
    .card::before { top: 7mm; }
    .card::after  { bottom: 7mm; }

    /* Logo */
    .logo {
      width: 28mm;
      display: block;
      margin: 0 auto;
    }

    /* Trennlinie */
    .divider {
      display: flex; align-items: center; gap: 3mm;
      width: 100%; margin: 3mm 0;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(201,169,110,0.3); }
    .divider-dot  { color: #C9A96E; font-size: 8px; }

    /* Headline */
    .headline {
      text-align: center;
    }
    .headline-sub {
      font-family: 'Jost', sans-serif;
      font-size: 8pt;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #C9A96E;
      margin-bottom: 2mm;
    }
    .headline-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22pt;
      font-weight: 400;
      color: #2C1F14;
      line-height: 1.15;
    }
    .headline-main em {
      font-style: italic;
      color: #C9A96E;
    }

    /* Mitte: Foto + QR */
    .middle {
      display: flex;
      align-items: flex-end;
      gap: 6mm;
      width: 100%;
    }
    .photo {
      width: 42mm;
      height: 52mm;
      object-fit: cover;
      object-position: top center;
      flex-shrink: 0;
    }
    .qr-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3mm;
    }
    .qr-text {
      text-align: center;
      font-size: 8.5pt;
      color: #6B5B4E;
      line-height: 1.6;
      font-weight: 300;
    }
    .qr-code {
      width: 36mm;
      height: 36mm;
      image-rendering: pixelated;
    }
    .qr-hint {
      font-size: 7pt;
      color: #C9A96E;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
    }

    /* Sterne */
    .stars {
      font-size: 16pt;
      color: #C9A96E;
      letter-spacing: 0.1em;
      text-align: center;
    }

    /* Footer */
    .footer {
      text-align: center;
    }
    .footer-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11pt;
      color: #2C1F14;
      letter-spacing: 0.05em;
    }
    .footer-address {
      font-size: 7.5pt;
      color: #9B8B7E;
      letter-spacing: 0.08em;
      margin-top: 1mm;
    }
  </style>
</head>
