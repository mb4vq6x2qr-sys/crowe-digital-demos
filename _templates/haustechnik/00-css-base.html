<!-- ══════════════════════════════════════════════
   TEMPLATE — CSS BASIS (Haustechnik / Reinigung)
   Style: Clean Corporate (inspiriert von assgmbh.ch)
   Font: Montserrat (Google Fonts)
   Anpassen: CSS-Variablen in :root
══════════════════════════════════════════════ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary:      #051729;
  --accent:       #087CEB;
  --accent-hover: #FEDB5D;
  --bg-light:     #ECF1F5;
  --text:         #051729;
  --text-muted:   #7A7F88;
  --white:        #ffffff;
  --border:       #ECE8EC;
  --shadow-sm:    0 2px 12px rgba(5,23,41,0.08);
  --shadow-md:    0 6px 30px rgba(5,23,41,0.12);
  --radius-sm:    8px;
  --radius-md:    12px;
  --radius-lg:    25px;
  --transition:   0.3s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Montserrat', sans-serif;
  font-size: 16px; font-weight: 500;
  color: var(--text-muted); line-height: 1.6;
  overflow-x: hidden;
}

/* ── Container ── */
.container {
  max-width: 1300px; margin: 0 auto; padding: 0 15px;
}

/* ── Sektionen ── */
section { padding: 90px 0; }
.section-bg { background: var(--bg-light); }

/* ── Überschriften ── */
h1, h2, h3, h4, h5 { color: var(--primary); line-height: 1.2; font-weight: 700; }
h1 { font-size: clamp(2rem, 5vw, 3.2rem); }
h2 { font-size: clamp(1.6rem, 3.5vw, 2.2rem); }
h3 { font-size: 1.3rem; }

.section-label {
  display: inline-block; font-size: 0.75rem;
  font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--accent);
  margin-bottom: 0.75rem;
}
.section-title { margin-bottom: 1rem; }
.section-sub { color: var(--text-muted); max-width: 560px; margin-bottom: 3rem; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 0.6rem;
  padding: 14px 28px; border-radius: var(--radius-md);
  font-family: 'Montserrat', sans-serif;
  font-size: 0.85rem; font-weight: 700;
  text-decoration: none; border: none; cursor: pointer;
  position: relative; overflow: hidden;
  transition: color var(--transition);
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: var(--accent-hover);
  transform: translateX(-100%);
  transition: transform 0.4s ease-in-out;
  z-index: 0;
}
.btn:hover::after { transform: translateX(0); }
.btn span, .btn svg { position: relative; z-index: 1; }

.btn-primary {
  background: var(--accent); color: var(--white);
}
.btn-primary:hover { color: var(--primary); }

.btn-outline {
  background: transparent; color: var(--accent);
  border: 2px solid var(--accent);
}
.btn-outline:hover { color: var(--primary); border-color: var(--accent-hover); }

/* Pfeil-Icon im Button */
.btn-arrow::after { } /* erbt von .btn */
.btn svg { width: 16px; height: 16px; transition: transform 0.3s; }
.btn:hover svg { transform: translateX(3px); }

/* ── Cards ── */
.card {
  background: var(--white); border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm); border: 1px solid var(--border);
  transition: box-shadow var(--transition), transform var(--transition);
}
.card:hover { box-shadow: var(--shadow-md); transform: translateY(-4px); }

/* ── Image Shine Hover ── */
.img-shine { position: relative; overflow: hidden; }
.img-shine::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.25);
  width: 60%; height: 0;
  transform: translate(-50%,-50%) rotate(-45deg);
  top: 50%; left: 50%;
  transition: height 600ms linear;
}
.img-shine:hover::after { height: 250%; }

/* ── Scroll Reveal ── */
.reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease, transform 0.6s ease; }
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }

/* ── Responsive ── */
@media (max-width: 768px) { section { padding: 60px 0; } }
</style>

<!-- JS: Scroll Reveal -->
<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
