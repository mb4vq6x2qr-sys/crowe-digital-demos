<!-- ══════════════════════════════════════════════
   SNIPPET — NOISE BACKGROUND BUTTON
   Quelle: aceternity.com/components/noise-background
   
   Anpassen:
   - data-colors: JSON Array mit 3 RGB-Farben
   - data-noise: Intensität der Textur (0.0–1.0, Standard: 0.2)
   - data-speed: Animationsgeschwindigkeit (Standard: 0.1)
   - .nb-button Text und Stil
   - .noise-bg rounded-full → rounded-2xl für eckigere Form
══════════════════════════════════════════════ -->

<style>
.noise-bg-wrapper {
  display: flex;
  justify-content: center;
}
.noise-bg {
  position: relative;
  overflow: hidden;
  border-radius: 9999px;
  background: #e5e5e5;
  padding: 0.5rem;
  width: fit-content;
  margin: 0 auto;
  box-shadow: inset 0px 0.5px 1px 0px #a3a3a3, 0px 1px 0px 0px #f5f5f5;
}
.noise-bg.rounded-xl { border-radius: 1rem; }
.nb-gradient-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.nb-top-strip {
  position: absolute;
  left: 0; right: 0; top: 0;
  height: 0.25rem;
  border-radius: 1rem 1rem 0 0;
  opacity: 0.8;
  filter: blur(4px);
  pointer-events: none;
}
.nb-noise-overlay {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}
.nb-noise-overlay img {
  width: 100%; height: 100%;
  object-fit: cover;
  mix-blend-mode: overlay;
}
.nb-content {
  position: relative;
  z-index: 10;
}
.nb-button {
  display: block;
  width: 100%;
  cursor: pointer;
  border-radius: 9999px;
  background: linear-gradient(to right, #f5f5f5, #f5f5f5, #ffffff);
  padding: 0.5rem 1.2rem;
  color: #000;
  border: none;
  font-family: inherit;
  font-size: 0.875rem;
  font-weight: 500;
  white-space: nowrap;
  box-shadow: inset 0px 2px 0px 0px #fafafa, 0px 0.5px 1px 0px #a3a3a3;
  transition: all 0.1s;
}
.nb-button:active { transform: scale(0.98); }
.nb-button:hover { background: linear-gradient(to right, #ebebeb, #ebebeb, #f5f5f5); }
</style>

<!-- HTML — Farben und Text hier anpassen -->
<div class="noise-bg-wrapper">
  <div class="noise-bg"
       data-colors='["rgb(255,100,150)","rgb(100,150,255)","rgb(255,200,100)"]'
       data-noise="0.2"
       data-speed="0.1">
    <div class="nb-gradient-layer"></div>
    <div class="nb-gradient-layer"></div>
    <div class="nb-gradient-layer"></div>
    <div class="nb-top-strip"></div>
    <div class="nb-noise-overlay">
      <img src="https://assets.aceternity.com/noise.webp" alt="">
    </div>
    <div class="nb-content">
      <button class="nb-button">Jetzt buchen &rarr;</button>
    </div>
  </div>
</div>

<script>
(function () {
  document.querySelectorAll('.noise-bg').forEach(function (el) {
    var colors = JSON.parse(el.dataset.colors || '["rgb(255,100,150)","rgb(100,150,255)","rgb(255,200,100)"]');
    var speed = parseFloat(el.dataset.speed || 0.1);
    var noiseOpacity = parseFloat(el.dataset.noise || 0.2);
    var x = 0, y = 0, vx = 0, vy = 0;
    var sx = { value: 0, velocity: 0, target: 0 };
    var sy = { value: 0, velocity: 0, target: 0 };
    var lastChange = 0, lastTime = 0;

    el.querySelector('.nb-noise-overlay img').style.opacity = noiseOpacity;
    el.querySelector('.nb-top-strip').style.background =
      'linear-gradient(to right, ' + colors.join(', ') + ')';

    function newVelocity() {
      var angle = Math.random() * Math.PI * 2;
      var mag = speed * (0.5 + Math.random() * 0.5);
      vx = Math.cos(angle) * mag;
      vy = Math.sin(angle) * mag;
    }

    function spring(s, dt) {
      var f = (s.target - s.value) * 100;
      var d = s.velocity * 30;
      s.velocity += (f - d) * (dt / 1000);
      s.value += s.velocity * (dt / 1000);
      return s.value;
    }

    function tick(time) {
      var dt = Math.min(time - lastTime, 32) || 16;
      lastTime = time;
      var r = el.getBoundingClientRect();
      var pad = 20;

      if (time - lastChange > 1500 + Math.random() * 1500) {
        newVelocity(); lastChange = time;
      }

      var nx = x + vx * 16;
      var ny = y + vy * 16;

      if (nx < pad || nx > r.width - pad || ny < pad || ny > r.height - pad) {
        newVelocity(); lastChange = time;
        nx = Math.max(pad, Math.min(r.width - pad, nx));
        ny = Math.max(pad, Math.min(r.height - pad, ny));
      }

      x = nx; y = ny;
      sx.target = nx; sy.target = ny;

      var svx = spring(sx, dt);
      var svy = spring(sy, dt);
      var mults = [1, 0.7, 1.2];
      var ops   = [0.4, 0.3, 0.25];

      el.querySelectorAll('.nb-gradient-layer').forEach(function (layer, i) {
        layer.style.background =
          'radial-gradient(circle at ' + (svx * mults[i]) + 'px ' +
          (svy * mults[i]) + 'px, ' + (colors[i] || colors[0]) + ' 0%, transparent 50%)';
        layer.style.opacity = ops[i];
      });

      var strip = el.querySelector('.nb-top-strip');
      if (strip) strip.style.transform = 'translateX(' + (svx * 0.1 - 50) + 'px)';

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(function () {
      var r = el.getBoundingClientRect();
      x = r.width / 2; y = r.height / 2;
      sx.value = sx.target = x;
      sy.value = sy.target = y;
      newVelocity();
      requestAnimationFrame(tick);
    });
  });
})();
</script>
