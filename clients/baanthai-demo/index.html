<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SERENA THAI – Massage Basel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #7c5cbf;
      --gold:   #c9a84c;
      --f: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--f);
      background: #0d0a14;
      overflow-x: hidden;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: 62px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.3rem;
      background: rgba(13,10,20,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .nav-logo { display: flex; align-items: center; gap: .55rem; text-decoration: none; }
    .nav-badge {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem; font-weight: 900; color: #fff;
    }
    .nav-name { display: flex; flex-direction: column; line-height: 1.15; }
    .nav-name strong { font-size: .82rem; font-weight: 800; color: #fff; letter-spacing: .05em; }
    .nav-name span { font-size: .6rem; color: rgba(255,255,255,.42); text-transform: uppercase; letter-spacing: .08em; }
    .hamburger {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
      cursor: pointer;
    }
    .hamburger span { display: block; width: 18px; height: 1.5px; background: rgba(255,255,255,.75); border-radius: 2px; }

    .hero {
      position: relative; min-height: 100vh;
      display: flex; align-items: flex-end;
      padding-bottom: 3.5rem; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=800&q=85') center/cover no-repeat;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(6,3,14,.95) 0%, rgba(6,3,14,.6) 50%, rgba(6,3,14,.15) 100%);
    }
    .hero-inner { position: relative; padding: 0 1.4rem; width: 100%; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      background: rgba(124,92,191,.18);
      border: 1px solid rgba(124,92,191,.4);
      border-radius: 100px; padding: .28rem .85rem;
      font-size: .65rem; font-weight: 700; color: #a98ae0;
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 1rem;
    }
    .hero-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #a98ae0; }
    .hero h1 {
      font-size: 2.7rem; font-weight: 900;
      color: #fff; line-height: 1.05;
      letter-spacing: -.03em; margin-bottom: .8rem;
    }
    .hero h1 em { font-style: italic; color: var(--gold); }
    .hero-sub {
      font-size: .88rem; color: rgba(255,255,255,.62);
      line-height: 1.65; margin-bottom: 1.6rem; font-weight: 300;
    }
    .hero-rating { display: flex; align-items: center; gap: .5rem; margin-bottom: 1.8rem; }
    .stars { color: var(--gold); font-size: .9rem; letter-spacing: .05em; }
    .rating-text { font-size: .72rem; color: rgba(255,255,255,.5); }
    .hero-cta {
      display: flex; align-items: center; justify-content: center;
      background: var(--accent); color: #fff;
      padding: .85rem 1.8rem; border-radius: 10px;
      font-weight: 700; font-size: .9rem; text-decoration: none;
      width: 100%;
    }
    .hero-cta-s {
      display: flex; align-items: center; justify-content: center;
      margin-top: .75rem;
      color: rgba(255,255,255,.5); font-size: .8rem;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">
      <div class="nav-badge">ST</div>
      <div class="nav-name">
        <strong>SERENA THAI</strong>
        <span>Massage · Basel</span>
      </div>
    </a>
    <div class="hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-badge"><span>Termine verfügbar</span></div>
      <h1>Dein Moment<br>der <em>Ruhe.</em></h1>
      <p class="hero-sub">Friedrichstrasse 15 · Basel — Authentische Thai-Massagen, so schön wie ein Kurzurlaub.</p>
      <div class="hero-rating">
        <span class="stars">★★★★★</span>
        <span class="rating-text">4.8 · 80+ Google-Bewertungen</span>
      </div>
      <a href="#" class="hero-cta">Termin online buchen</a>
      <a href="#" class="hero-cta-s">Alle Angebote ansehen →</a>
    </div>
  </section>

</body>
</html>
