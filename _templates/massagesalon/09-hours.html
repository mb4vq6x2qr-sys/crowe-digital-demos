<!-- ══════════════════════════════════════════════
   TEMPLATE — ÖFFNUNGSZEITEN (Massagesalon)
   Anpassen:
   - Wochentage und Zeiten
   - Geschlossen: hours-closed Klasse verwenden
   - hours-note: z.B. «Termine auf Anfrage auch ausserhalb der Zeiten»
══════════════════════════════════════════════ -->

<!-- CSS (in <head>) -->
<style>
.hours { background: var(--warm); color: var(--cream); }
.hours .section-title { color: var(--cream); }
.hours-inner {
  max-width: 560px; margin: 0 auto;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,169,110,0.12);
  padding: 3rem;
}
.hours-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1rem 0; border-bottom: 1px solid rgba(201,169,110,0.08);
}
.hours-row:last-child { border-bottom: none; }
.hours-day { font-size: 0.88rem; font-weight: 400; letter-spacing: 0.05em; color: rgba(232,213,176,0.7); }
.hours-time { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--gold); letter-spacing: 0.03em; }
.hours-closed { font-style: italic; color: rgba(232,213,176,0.25) !important; font-family: 'Jost', sans-serif !important; font-size: 0.8rem !important; }
.hours-note { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: rgba(232,213,176,0.3); letter-spacing: 0.05em; line-height: 1.7; }
</style>

<!-- HTML -->
<section class="hours">
  <span class="section-tag reveal">Wir sind für Sie da</span>
  <h2 class="section-title reveal">Öffnungszeiten</h2>
  <div class="divider"><div class="divider-line"></div><div class="divider-icon">✦</div><div class="divider-line r"></div></div>

  <div class="hours-inner reveal">
    <div class="hours-row">
      <span class="hours-day">Montag</span>
      <span class="hours-time">[10:00 – 20:00]</span>
    </div>
    <div class="hours-row">
      <span class="hours-day">Dienstag</span>
      <span class="hours-time">[10:00 – 20:00]</span>
    </div>
    <div class="hours-row">
      <span class="hours-day">Mittwoch</span>
      <span class="hours-time">[10:00 – 20:00]</span>
    </div>
    <div class="hours-row">
      <span class="hours-day">Donnerstag</span>
      <span class="hours-time">[10:00 – 20:00]</span>
    </div>
    <div class="hours-row">
      <span class="hours-day">Freitag</span>
      <span class="hours-time">[10:00 – 20:00]</span>
    </div>
    <div class="hours-row">
      <span class="hours-day">Samstag</span>
      <span class="hours-time">[10:00 – 18:00]</span>
    </div>
    <div class="hours-row">
      <span class="hours-day">Sonntag</span>
      <span class="hours-time hours-closed">Geschlossen</span>
    </div>

    <p class="hours-note">
      Termine nach Vereinbarung auch ausserhalb der Öffnungszeiten möglich.<br>
      <!-- Anpassen oder weglassen -->
    </p>
  </div>
</section>
